name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Unix binary
        run: |
          docker build --build-arg RUNTIME=linux-x64 -t pricingalerts-builder -f PricingAlerts/Dockerfile.build .
          docker create --name pricingalerts-tmp pricingalerts-builder
          docker cp pricingalerts-tmp:/app/out/PricingAlerts ./pricing-alerts
          docker rm pricingalerts-tmp
          chmod +x ./pricing-alerts

      - name: Build Windows binary
        run: |
          docker build --build-arg RUNTIME=win-x64 -t pricingalerts-builder-win -f PricingAlerts/Dockerfile.build .
          docker create --name pricingalerts-tmp-win pricingalerts-builder-win
          docker cp pricingalerts-tmp-win:/app/out/PricingAlerts.exe ./pricing-alerts.exe
          docker rm pricingalerts-tmp-win

      - name: Build macOS ARM binary
        run: |
          docker build --build-arg RUNTIME=osx-arm64 -t pricingalerts-builder-macos-arm -f PricingAlerts/Dockerfile.build .
          docker create --name pricingalerts-tmp-macos-arm pricingalerts-builder-macos-arm
          docker cp pricingalerts-tmp-macos-arm:/app/out/PricingAlerts ./pricing-alerts-macos-arm
          docker rm pricingalerts-tmp-macos-arm
          chmod +x ./pricing-alerts-macos-arm

      - name: Build macOS Intel binary
        run: |
          docker build --build-arg RUNTIME=osx-x64 -t pricingalerts-builder-macos-intel -f PricingAlerts/Dockerfile.build .
          docker create --name pricingalerts-tmp-macos-intel pricingalerts-builder-macos-intel
          docker cp pricingalerts-tmp-macos-intel:/app/out/PricingAlerts ./pricing-alerts-macos-intel
          docker rm pricingalerts-tmp-macos-intel
          chmod +x ./pricing-alerts-macos-intel

      - name: Upload binaries to release
        run: gh release upload ${{ github.event.release.tag_name }} ./pricing-alerts ./pricing-alerts.exe ./pricing-alerts-macos-arm ./pricing-alerts-macos-intel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
